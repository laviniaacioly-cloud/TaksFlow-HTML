<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Pagina</title>
</head>
<body>
    <h2>Ola Mundo!</h2>
    <p>Meu primeiro paragrafo de teste</p>
    <strong>Continue</strong> o texto...

    <p>Texto comum em paragrafo</p>
<!-- strong = negrito -->
    <p>Use <strong>negrito</strong> para descartar algo importante.</p>
<!-- em = italico -->
    <p>Use <em>italico</em> para enfase ou termos tecnicos.</p>

    <p>Pode combinar: <strong><em>negrito e italico</em></strong>.</p>

</body>

</html>

<!-- p = paragrafo -->
